<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六一儿童节快乐</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
            max-width: 600px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .title {
            font-size: 3.5em;
            color: #e91e63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.3);
            animation: rainbow 3s infinite;
        }

        @keyframes rainbow {
            0% { color: #e91e63; }
            25% { color: #9c27b0; }
            50% { color: #3f51b5; }
            75% { color: #00bcd4; }
            100% { color: #e91e63; }
        }

        .subtitle {
            font-size: 1.8em;
            color: #ff6b6b;
            margin-bottom: 30px;
        }

        .message {
            font-size: 1.3em;
            color: #555;
            line-height: 2;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 4em;
            animation: bounce 1s infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .heart {
            color: #e91e63;
            font-size: 2em;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
        }

        .balloons {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50%;
            animation: rise linear infinite;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 20px solid inherit;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: 50%;
            width: 2px;
            height: 80px;
            background: rgba(255, 255, 255, 0.5);
        }

        @keyframes rise {
            0% {
                bottom: -150px;
                opacity: 1;
            }
            100% {
                bottom: 110%;
                opacity: 0.8;
            }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .footer {
            margin-top: 30px;
            font-size: 1.1em;
            color: #888;
        }

        .date {
            color: #e91e63;
            font-weight: bold;
        }

        /* 添加一些装饰元素 */
        .decoration {
            position: absolute;
            font-size: 2em;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 礼物盒遮罩层 */
        .gift-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }

        .gift-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .gift-box {
            position: relative;
            width: 180px;
            height: 180px;
            cursor: pointer;
            animation: giftBounce 2s ease-in-out infinite;
        }

        @keyframes giftBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .gift-body {
            position: absolute;
            bottom: 0;
            width: 180px;
            height: 120px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .gift-lid {
            position: absolute;
            top: 0;
            left: -10px;
            width: 200px;
            height: 50px;
            background: linear-gradient(135deg, #ff8e53, #ff6b6b);
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
            transform-origin: bottom;
            transition: transform 0.5s ease;
        }

        .gift-box:hover .gift-lid {
            transform: rotate(-15deg) translateY(-10px);
        }

        .gift-ribbon {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 100%;
            background: linear-gradient(to right, #ffd700, #ffed4e, #ffd700);
        }

        .gift-ribbon::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
        }

        .gift-bow {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 30px;
        }

        .gift-bow::before,
        .gift-bow::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #ffd700, #ffed4e);
            border-radius: 50% 50% 50% 0;
        }

        .gift-bow::before {
            left: 0;
            transform: rotate(-45deg);
        }

        .gift-bow::after {
            right: 0;
            transform: rotate(45deg) scaleX(-1);
        }

        .gift-text {
            margin-top: 40px;
            font-size: 1.8em;
            color: white;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            animation: textPulse 2s ease-in-out infinite;
        }

        @keyframes textPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.9; }
        }

        .gift-hint {
            margin-top: 15px;
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.8);
        }

        /* 主内容初始隐藏 */
        .container {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* 音乐播放按钮样式 */
        .music-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
            border: none;
            cursor: pointer;
            display: none;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .music-btn.visible {
            display: flex;
        }

        .music-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .music-btn i {
            color: white;
            font-size: 24px;
        }

        .music-btn.playing {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        /* 音乐提示 */
        .music-hint {
            position: fixed;
            top: 90px;
            right: 20px;
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            color: #ff6b6b;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            animation: fadeInOut 3s ease-in-out;
            z-index: 999;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(-10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* 音乐波形动画 */
        .music-waves {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 4px;
            z-index: 999;
        }

        .music-waves.active {
            display: flex;
        }

        .wave {
            width: 4px;
            height: 20px;
            background: linear-gradient(to top, #ff6b6b, #ff8e53);
            border-radius: 2px;
            animation: wave 0.5s ease-in-out infinite;
        }

        .wave:nth-child(2) { animation-delay: 0.1s; }
        .wave:nth-child(3) { animation-delay: 0.2s; }
        .wave:nth-child(4) { animation-delay: 0.3s; }
        .wave:nth-child(5) { animation-delay: 0.4s; }

        @keyframes wave {
            0%, 100% { height: 10px; }
            50% { height: 25px; }
        }

        /* ========== 移动端适配 ========== */

        /* 平板设备 */
        @media screen and (max-width: 768px) {
            .container {
                padding: 20px;
            }

            .card {
                padding: 40px 50px;
                border-radius: 25px;
            }

            .title {
                font-size: 2.5em;
            }

            .subtitle {
                font-size: 1.5em;
            }

            .message {
                font-size: 1.2em;
            }

            .emoji {
                font-size: 3em;
            }
        }

        /* 手机设备 */
        @media screen and (max-width: 480px) {
            body {
                padding: 15px;
                padding-top: 80px;
                padding-bottom: 50px;
                align-items: flex-start;
            }

            .container {
                padding: 10px;
                padding-bottom: 30px;
                width: 100%;
            }

            .card {
                padding: 30px 25px;
                border-radius: 20px;
                box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
                margin-bottom: 30px;
            }

            .title {
                font-size: 1.8em;
                margin-bottom: 15px;
            }

            .subtitle {
                font-size: 1.2em;
                margin-bottom: 20px;
            }

            .message {
                font-size: 1em;
                line-height: 1.8;
                margin-bottom: 20px;
            }

            .message p {
                margin-bottom: 8px;
            }

            .emoji {
                font-size: 2.5em;
            }

            .heart {
                font-size: 1.6em;
            }

            .footer {
                font-size: 0.95em;
                margin-top: 20px;
            }

            /* 音乐按钮适配 */
            .music-btn {
                width: 50px;
                height: 50px;
                top: 15px;
                right: 15px;
            }

            .music-btn i {
                font-size: 20px;
            }

            /* 礼物盒适配 */
            .gift-box {
                width: 140px;
                height: 140px;
            }

            .gift-body {
                width: 140px;
                height: 90px;
            }

            .gift-lid {
                width: 160px;
                height: 40px;
                left: -10px;
            }

            .gift-ribbon {
                width: 25px;
            }

            .gift-bow {
                width: 50px;
                height: 25px;
                top: -20px;
            }

            .gift-bow::before,
            .gift-bow::after {
                width: 25px;
                height: 25px;
            }

            .gift-text {
                font-size: 1.4em;
                margin-top: 30px;
            }

            .gift-hint {
                font-size: 1em;
            }

            /* 波形适配 */
            .music-waves {
                bottom: 15px;
            }

            .wave {
                width: 3px;
                height: 15px;
            }

            /* 减少气球数量和大小 */
            .balloon {
                width: 35px;
                height: 45px;
            }

            /* 减少动画性能消耗 */
            @keyframes float {
                0%, 100% { transform: translateY(0px); }
                50% { transform: translateY(-10px); }
            }
        }

        /* 小屏手机 */
        @media screen and (max-width: 360px) {
            body {
                padding: 10px;
                padding-top: 70px;
            }

            .card {
                padding: 25px 20px;
            }

            .title {
                font-size: 1.5em;
            }

            .subtitle {
                font-size: 1.1em;
            }

            .message {
                font-size: 0.95em;
            }

            .emoji {
                font-size: 2em;
            }
        }

        /* 横屏模式 */
        @media screen and (max-width: 768px) and (orientation: landscape) {
            body {
                padding-top: 20px;
                align-items: center;
            }

            .card {
                padding: 25px 40px;
            }

            .title {
                font-size: 2em;
            }

            .message {
                font-size: 1em;
            }
        }

        /* 安全区域适配（iPhone X 及以上） */
        @supports (padding: max(0px)) {
            body {
                padding-left: max(15px, env(safe-area-inset-left));
                padding-right: max(15px, env(safe-area-inset-right));
                padding-bottom: max(50px, env(safe-area-inset-bottom));
            }

            .container {
                padding-bottom: max(30px, env(safe-area-inset-bottom));
            }

            .music-btn {
                top: max(15px, env(safe-area-inset-top));
                right: max(15px, env(safe-area-inset-right));
            }

            .music-hint {
                top: max(75px, calc(env(safe-area-inset-top) + 60px));
            }
        }
    </style>
</head>
<body>
    <!-- 背景音乐 - 欢快的儿童节音乐 -->
    <audio id="bgMusic" loop preload="none">
    </audio>

    <!-- 礼物盒遮罩层 -->
    <div class="gift-overlay" id="giftOverlay">
        <div class="gift-box">
            <div class="gift-lid">
                <div class="gift-bow"></div>
            </div>
            <div class="gift-body">
                <div class="gift-ribbon"></div>
            </div>
        </div>
        <p class="gift-text">点击拆开礼物</p>
        <p class="gift-hint">接受一份特别的祝福 ✨</p>
    </div>

    <!-- 音乐播放按钮 -->
    <button class="music-btn" id="musicBtn" onclick="toggleMusic()">
        <i class="fas fa-music" id="musicIcon"></i>
    </button>

    <!-- 音乐波形 -->
    <div class="music-waves" id="musicWaves">
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <div class="stars" id="stars"></div>
    <div class="balloons" id="balloons"></div>

    <div class="container">
        <div class="card">
            <div class="emoji">🎈🎁🎉</div>
            <h1 class="title">六一儿童节快乐！</h1>
            <p class="subtitle">致我最爱的冰纯童鞋</p>

            <div class="message">
                <p>愿你永远保持童心未泯</p>
                <p>像孩子一样纯真快乐</p>
                <p>每一天都充满阳光与欢笑</p>
                <p>无论几岁，开心万岁！</p>
            </div>

            <div class="heart">❤️</div>

            <div class="footer">
                <p>永远爱你的 <span class="date">何先生</span></p>
                <p class="date">2025.06.01</p>
            </div>
        </div>
    </div>

    <script>
        // 音乐控制
        const bgMusic = document.getElementById('bgMusic');
        const musicBtn = document.getElementById('musicBtn');
        const musicIcon = document.getElementById('musicIcon');
        const musicWaves = document.getElementById('musicWaves');
        const musicHint = document.getElementById('musicHint');
        const giftOverlay = document.getElementById('giftOverlay');
        const container = document.querySelector('.container');
        let isPlaying = false;
        let giftOpened = false;

        // 使用本地音乐文件
        bgMusic.src = 'music.mp3';
        bgMusic.volume = 0.6;

        // 点击礼物盒打开
        giftOverlay.addEventListener('click', openGift);

        function openGift() {
            if (giftOpened) return;
            giftOpened = true;

            // 隐藏礼物盒
            giftOverlay.classList.add('hidden');

            // 显示主内容
            container.classList.add('visible');

            // 显示音乐控制按钮
            musicBtn.classList.add('visible');

            // 播放音乐
            bgMusic.play().then(() => {
                isPlaying = true;
                musicIcon.className = 'fas fa-pause';
                musicBtn.classList.add('playing');
                musicWaves.classList.add('active');
            }).catch(err => {
                console.log('自动播放失败，请点击音乐按钮播放');
            });

            // 显示波形
            musicWaves.classList.add('active');
        }

        function toggleMusic() {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.className = 'fas fa-music';
                musicBtn.classList.remove('playing');
                musicWaves.classList.remove('active');
            } else {
                bgMusic.play();
                musicIcon.className = 'fas fa-pause';
                musicBtn.classList.add('playing');
                musicWaves.classList.add('active');
            }
            isPlaying = !isPlaying;
        }

        // 隐藏音乐提示（已不需要）
        if (musicHint) {
            musicHint.style.display = 'none';
        }

        // 创建星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 4 + 2 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 创建气球
        function createBalloons() {
            const balloonsContainer = document.getElementById('balloons');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96e6a1', '#dda0dd', '#f7dc6f', '#ff9ff3'];

            for (let i = 0; i < 10; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                balloon.style.animationDuration = (Math.random() * 5 + 8) + 's';
                balloon.style.animationDelay = Math.random() * 5 + 's';
                balloonsContainer.appendChild(balloon);
            }
        }

        // 初始化
        createStars();
        createBalloons();
    </script>
</body>
</html>
