<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六一儿童节快乐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
            max-width: 600px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .title {
            font-size: 3.5em;
            color: #e91e63;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(233, 30, 99, 0.3);
            animation: rainbow 3s infinite;
        }

        @keyframes rainbow {
            0% { color: #e91e63; }
            25% { color: #9c27b0; }
            50% { color: #3f51b5; }
            75% { color: #00bcd4; }
            100% { color: #e91e63; }
        }

        .subtitle {
            font-size: 1.8em;
            color: #ff6b6b;
            margin-bottom: 30px;
        }

        .message {
            font-size: 1.3em;
            color: #555;
            line-height: 2;
            margin-bottom: 30px;
        }

        .emoji {
            font-size: 4em;
            animation: bounce 1s infinite;
            display: inline-block;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .heart {
            color: #e91e63;
            font-size: 2em;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1); }
            50% { transform: scale(1); }
            75% { transform: scale(1.2); }
        }

        .balloons {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -150px;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50%;
            animation: rise linear infinite;
        }

        .balloon::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 20px solid inherit;
        }

        .balloon::after {
            content: '';
            position: absolute;
            bottom: -100px;
            left: 50%;
            width: 2px;
            height: 80px;
            background: rgba(255, 255, 255, 0.5);
        }

        @keyframes rise {
            0% {
                bottom: -150px;
                opacity: 1;
            }
            100% {
                bottom: 110%;
                opacity: 0.8;
            }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        .footer {
            margin-top: 30px;
            font-size: 1.1em;
            color: #888;
        }

        .date {
            color: #e91e63;
            font-weight: bold;
        }

        /* 添加一些装饰元素 */
        .decoration {
            position: absolute;
            font-size: 2em;
            animation: spin 4s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="balloons" id="balloons"></div>

    <div class="container">
        <div class="card">
            <div class="emoji">🎈🎁🎉</div>
            <h1 class="title">六一儿童节快乐！</h1>
            <p class="subtitle">致我最亲爱的小可爱</p>

            <div class="message">
                <p>愿你永远保持童心未泯</p>
                <p>像孩子一样纯真快乐</p>
                <p>每一天都充满阳光与欢笑</p>
                <p>无论几岁，开心万岁！</p>
            </div>

            <div class="heart">❤️</div>

            <div class="footer">
                <p>永远爱你的 <span class="date">小笨蛋</span></p>
                <p class="date">2025.06.01</p>
            </div>
        </div>
    </div>

    <script>
        // 创建星星
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 50; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 4 + 2 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }

        // 创建气球
        function createBalloons() {
            const balloonsContainer = document.getElementById('balloons');
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#96e6a1', '#dda0dd', '#f7dc6f', '#ff9ff3'];

            for (let i = 0; i < 10; i++) {
                const balloon = document.createElement('div');
                balloon.className = 'balloon';
                balloon.style.left = Math.random() * 100 + '%';
                balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                balloon.style.animationDuration = (Math.random() * 5 + 8) + 's';
                balloon.style.animationDelay = Math.random() * 5 + 's';
                balloonsContainer.appendChild(balloon);
            }
        }

        // 初始化
        createStars();
        createBalloons();
    </script>
</body>
</html>
